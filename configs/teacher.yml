seed: 0

data:
  num_workers: 4

teacher:
  backbone: efficientnet_b0
  pretrained: true
  image_size: 224

training:
  batch_size: 16
  epochs: 20
  learning_rate: 0.0003
  weight_decay: 0.0001
  optimizer: adamw
  label_smoothing: 0.1

outputs:
  checkpoint: outputs/checkpoints/teacher_efficientnet_b0.pth
  logits: outputs/predictions/teacher_soft_labels.npy
  filenames: outputs/predictions/teacher_filenames.txt