seed: 0

data:
  num_workers: 4

distillation:
  temperature: 4
  alpha: 0.7
  temperature_sweep: [2, 4, 6, 8]

training:
  epochs: 50
  batch_size_labeled: 16
  batch_size_unlabeled: 32
  learning_rate: 0.001
  weight_decay: 0.0001

augmentation:
  enabled: true
  horizontal_flip: 0.5
  rotation_degrees: 10
  color_jitter:
    brightness: 0.15
    contrast: 0.15
    saturation: 0.10

outputs:
  model: model.pt
  results_csv: outputs/logs/temperature_results.csv