seed: 0

data:
  num_workers: 4

model:
  image_size: 96
  num_classes: 7
  dropout: 0.3
  max_params: 500000

training:
  batch_size: 16
  epochs: 30
  learning_rate: 0.001
  weight_decay: 0.0001

optimizer:
  type: adam

scheduler:
  type: cosine

augmentation:
  enabled: true
  horizontal_flip: 0.5
  rotation_degrees: 10
  color_jitter:
    brightness: 0.15
    contrast: 0.15
    saturation: 0.10